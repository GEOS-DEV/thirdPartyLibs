spack:
  config:
    install_tree:
      root: $spack/..
      projections:
        all: '{compiler.name}-{compiler.version}/{name}-{version}-{hash}'
    misc_cache: $spack/../misc_cache
    test_stage: $spack/../test_stage
    build_stage::
    - $spack/../build_stage

  # Regular TPLs do not need views
  view: false

  # Include shared variants and versions
  include:
  - ../defaults.yaml
  - ../versions.yaml

  # ---------------------------------------------------------------------------
  # Toolchains
  #
  # Aligned with the geosx/ubuntu:* base images produced by
  # https://github.com/GEOS-DEV/docker_base_images. Each base image installs
  # exactly one of these toolchains; the matrix in
  # .github/workflows/docker_build_tpls.yml picks the matching '%<name>'
  # selector via the SPEC build-arg.
  # ---------------------------------------------------------------------------
  toolchains:
    clang-19:
      - spec: '%[virtuals=c]llvm@19+clang~flang~lld~lldb'
        when: '%c'
      - spec: '%[virtuals=cxx]llvm@19+clang~flang~lld~lldb'
        when: '%cxx'
      - spec: '%[virtuals=fortran]gcc@13'
        when: '%fortran'
      - spec: '%openmpi'
        when: '%mpi'
    clang-20:
      - spec: cxxflags='-pthread'
      - spec: cflags='-pthread'
      - spec: '%[virtuals=c]llvm@20+clang~flang~lld~lldb'
        when: '%c'
      - spec: '%[virtuals=cxx]llvm@20+clang~flang~lld~lldb'
        when: '%cxx'
      - spec: '%[virtuals=fortran]gcc@13'
        when: '%fortran'
      - spec: '%openmpi'
        when: '%mpi'
    clang-22:
      - spec: cxxflags='-pthread'
      - spec: cflags='-pthread'
      - spec: '%[virtuals=c]llvm@22+clang~flang~lld~lldb'
        when: '%c'
      - spec: '%[virtuals=cxx]llvm@22+clang~flang~lld~lldb'
        when: '%cxx'
      - spec: '%[virtuals=fortran]gcc@13'
        when: '%fortran'
      - spec: '%openmpi'
        when: '%mpi'
    gcc-12:
      - spec: cxxflags='-pthread'
      - spec: cflags='-pthread'
      - spec: '%c=gcc@12'
        when: '%c'
      - spec: '%cxx=gcc@12'
        when: '%cxx'
      - spec: '%fortran=gcc@12'
        when: '%fortran'
      - spec: '%openmpi %gcc@12'
        when: '%mpi'
    gcc-13:
      - spec: cxxflags='-pthread'
      - spec: cflags='-pthread'
      - spec: '%c=gcc@13'
        when: '%c'
      - spec: '%cxx=gcc@13'
        when: '%cxx'
      - spec: '%fortran=gcc@13'
        when: '%fortran'
      - spec: '%openmpi %gcc@13'
        when: '%mpi'
    gcc-14:
      - spec: cxxflags='-pthread'
      - spec: cflags='-pthread'
      - spec: '%c=gcc@14'
        when: '%c'
      - spec: '%cxx=gcc@14'
        when: '%cxx'
      - spec: '%fortran=gcc@14'
        when: '%fortran'
      - spec: '%openmpi %gcc@14'
        when: '%mpi'
    gcc-15:
      - spec: cxxflags='-pthread'
      - spec: cflags='-pthread'
      - spec: '%c=gcc@15'
        when: '%c'
      - spec: '%cxx=gcc@15'
        when: '%cxx'
      - spec: '%fortran=gcc@15'
        when: '%fortran'
      - spec: '%openmpi %gcc@15'
        when: '%mpi'

  packages:
    all:
      target: [x86_64]

    mpi:
      require:
      - openmpi@4.1.6

    zlib-api:
      require:
      - zlib

    blas:
      require:
      - "netlib-lapack"
    lapack:
      require:
      - "netlib-lapack"

    # ---- Compilers (point at the actual binaries in /usr/bin) ----
    llvm:
      externals:
      - spec: llvm@19+clang~flang~lld~lldb
        prefix: /usr
        extra_attributes:
          compilers:
            c: /usr/bin/clang-19
            cxx: /usr/bin/clang++-19
      - spec: llvm@20+clang~flang~lld~lldb
        prefix: /usr
        extra_attributes:
          compilers:
            c: /usr/bin/clang-20
            cxx: /usr/bin/clang++-20
      - spec: llvm@22+clang~flang~lld~lldb
        prefix: /usr
        extra_attributes:
          compilers:
            c: /usr/bin/clang-22
            cxx: /usr/bin/clang++-22

    gcc:
      externals:
      - spec: gcc@12 languages:='c,c++,fortran'
        prefix: /usr
        extra_attributes:
          compilers:
            c: /usr/bin/gcc-12
            cxx: /usr/bin/g++-12
            fortran: /usr/bin/gfortran-12
      - spec: gcc@13 languages:='c,c++,fortran'
        prefix: /usr
        extra_attributes:
          compilers:
            c: /usr/bin/gcc-13
            cxx: /usr/bin/g++-13
            fortran: /usr/bin/gfortran-13
      - spec: gcc@14 languages:='c,c++,fortran'
        prefix: /usr
        extra_attributes:
          compilers:
            c: /usr/bin/gcc-14
            cxx: /usr/bin/g++-14
            fortran: /usr/bin/gfortran-14
      - spec: gcc@15 languages:='c,c++,fortran'
        prefix: /usr
        extra_attributes:
          compilers:
            c: /usr/bin/gcc-15
            cxx: /usr/bin/g++-15
            fortran: /usr/bin/gfortran-15


    doxygen:
      buildable: false
      externals:
      - spec: doxygen@1.8.20
        prefix: /usr

    autoconf:
      version: [2.71]
      buildable: false
      externals:
      - spec: autoconf@2.71
        prefix: /usr
    automake:
      version: [1.16.5]
      buildable: false
      externals:
      - spec: automake@1.16.5
        prefix: /usr
    cmake:
      version: [3.31.9]
      buildable: false
      externals:
      - spec: cmake@3.31.9
        prefix: /usr/local
    cuda:
      buildable: False
      externals:
      - spec: cuda@12.9.1 +allow-unsupported-compilers
        prefix: /usr/local/cuda
      - spec: cuda@13.2.1 +allow-unsupported-compilers
        prefix: /usr/local/cuda

    findutils:
      version: [4.9.0]
      buildable: false
      externals:
      - spec: findutils@4.9.0
        prefix: /usr
    m4:
      buildable: false
      externals:
      - spec: m4@1.4.18
        prefix: /usr
    mpfr:
      buildable: false
      externals:
      - spec: mpfr@4.2.0
        prefix: /usr
    netlib-lapack:
      buildable: false
      externals:
      - spec: netlib-lapack@3.12.0
        prefix: /usr
    netlib-blas:
      buildable: false
      externals:
      - spec: netlib-blas@3.12.0
        prefix: /usr
    # ---- OpenMPI: same prefix for every compiler binding (Ubuntu 24.04 ships one)
    openmpi:
      buildable: false
      externals:
      - spec: openmpi@4.1.6 %clang@19
        prefix: /usr
      - spec: openmpi@4.1.6 %clang@20
        prefix: /usr
      - spec: openmpi@4.1.6 %clang@22
        prefix: /usr
      - spec: openmpi@4.1.6 %gcc@12
        prefix: /usr
      - spec: openmpi@4.1.6 %gcc@13
        prefix: /usr
      - spec: openmpi@4.1.6 %gcc@14
        prefix: /usr
      - spec: openmpi@4.1.6 %gcc@15
        prefix: /usr
    perl:
      buildable: false
      externals:
      - spec: perl@5.38.2
        prefix: /usr
    pkg-config:
      buildable: false
      externals:
      - spec: pkg-config@0.29.2
        prefix: /usr
    py-sphinx:
      buildable: false
      externals:
      - spec: py-sphinx@7.4.7
        prefix: /usr
    python:
      buildable: false
      externals:
      - spec: python@3.12
        prefix: /usr/local
    readline:
      buildable: false
      externals:
      - spec: readline@8.2
        prefix: /usr
    tar:
      buildable: false
      externals:
      - spec: tar@1.35
        prefix: /usr
    unzip:
      buildable: false
      externals:
      - spec: unzip@6.0
        prefix: /usr
    xz:
      buildable: false
      externals:
      - spec: xz@5.6.1
        prefix: /usr
    zlib:
      buildable: false
      externals:
      - spec: zlib@1.3
        prefix: /usr
