spack:
  config:
    install_tree:
      root: $spack/..
      projections:
        all: '{compiler.name}-{compiler.version}/{name}-{version}-{hash}'
    misc_cache: $spack/../misc_cache
    test_stage: $spack/../test_stage
    build_stage::
    - $spack/../build_stage

  # Regular TPLs do not need views
  view: false

  # Include shared variants and versions
  include:
  - ../defaults.yaml
  - ../versions.yaml

  # ---------------------------------------------------------------------------
  # Toolchains
  #
  # Aligned with the geosx/rockylinux:* base images produced by
  # https://github.com/GEOS-DEV/docker_base_images. Each base image installs
  # exactly one of these toolchains; the matrix in
  # .github/workflows/docker_build_tpls.yml picks the matching '%<name>'
  # selector via the SPEC build-arg.
  # ---------------------------------------------------------------------------
  toolchains:
    gcc-12:
      - spec: cxxflags='-fPIC -pthread'
      - spec: cflags='-fPIC -pthread'
      - spec: '%c=gcc@12'
        when: '%c'
      - spec: '%cxx=gcc@12'
        when: '%cxx'
      - spec: '%fortran=gcc@12'
        when: '%fortran'
      - spec: '%openmpi'
        when: '%mpi'
    gcc-13:
      - spec: cxxflags='-fPIC -pthread'
      - spec: cflags='-fPIC -pthread'
      - spec: '%c=gcc@13'
        when: '%c'
      - spec: '%cxx=gcc@13'
        when: '%cxx'
      - spec: '%fortran=gcc@13'
        when: '%fortran'
      - spec: '%openmpi'
        when: '%mpi'
    gcc-15:
      - spec: cxxflags='-fPIC -pthread'
      - spec: cflags='-fPIC -pthread'
      - spec: '%c=gcc@15'
        when: '%c'
      - spec: '%cxx=gcc@15'
        when: '%cxx'
      - spec: '%fortran=gcc@15'
        when: '%fortran'
      - spec: '%openmpi'
        when: '%mpi'
    # clang base images provide clang/clang++ as CC/CXX and gfortran from the
    # paired GCC version.
    clang-19:
      - spec: cxxflags='-fPIC -pthread'
      - spec: cflags='-fPIC -pthread'
      - spec: '%[virtuals=c]llvm@19+clang~flang~lld~lldb'
        when: '%c'
      - spec: '%[virtuals=cxx]llvm@19+clang~flang~lld~lldb'
        when: '%cxx'
      - spec: '%[virtuals=fortran]gcc@13'
        when: '%fortran'
      - spec: '%openmpi'
        when: '%mpi'
    clang-20:
      - spec: cxxflags='-fPIC -pthread'
      - spec: cflags='-fPIC -pthread'
      - spec: '%[virtuals=c]llvm@20+clang~flang~lld~lldb'
        when: '%c'
      - spec: '%[virtuals=cxx]llvm@20+clang~flang~lld~lldb'
        when: '%cxx'
      - spec: '%[virtuals=fortran]gcc@15'
        when: '%fortran'
      - spec: '%openmpi'
        when: '%mpi'
    clang-22:
      - spec: cxxflags='-fPIC -pthread'
      - spec: cflags='-fPIC -pthread'
      - spec: '%[virtuals=c]llvm@22+clang~flang~lld~lldb'
        when: '%c'
      - spec: '%[virtuals=cxx]llvm@22+clang~flang~lld~lldb'
        when: '%cxx'
      - spec: '%[virtuals=fortran]gcc@15'
        when: '%fortran'
      - spec: '%openmpi'
        when: '%mpi'

  packages:
    all:
      target: [x86_64]
      providers:
        zlib-api: [zlib]

    # Rocky 8 ships OpenMPI 4.1.1; Rocky 9 ships 4.1.5. Same install prefix on
    # both. We declare both externals; Spack resolves whichever matches the
    # toolchain pin in the SPEC.
    mpi:
      require:
      - openmpi

    blas:
      require:
      - "netlib-lapack"
    lapack:
      require:
      - "netlib-lapack"

    # ---- Compilers ----
    # Point Spack directly at the clang/clang++ binaries from the base image.
    llvm:
      externals:
      - spec: llvm@19+clang~flang~lld~lldb
        prefix: /usr
        extra_attributes:
          compilers:
            c: /usr/bin/clang
            cxx: /usr/bin/clang++
      - spec: llvm@20+clang~flang~lld~lldb
        prefix: /usr
        extra_attributes:
          compilers:
            c: /usr/bin/clang
            cxx: /usr/bin/clang++
      - spec: llvm@22+clang~flang~lld~lldb
        prefix: /usr
        extra_attributes:
          compilers:
            c: /usr/bin/clang
            cxx: /usr/bin/clang++

    gcc:
      externals:
      - spec: gcc@12 languages:='c,c++,fortran'
        prefix: /opt/rh/gcc-toolset-12/root/usr
        extra_attributes:
          compilers:
            c: /opt/rh/gcc-toolset-12/root/usr/bin/gcc
            cxx: /opt/rh/gcc-toolset-12/root/usr/bin/g++
            fortran: /opt/rh/gcc-toolset-12/root/usr/bin/gfortran
      - spec: gcc@13 languages:='c,c++,fortran'
        prefix: /opt/rh/gcc-toolset-13/root/usr
        extra_attributes:
          compilers:
            c: /opt/rh/gcc-toolset-13/root/usr/bin/gcc
            cxx: /opt/rh/gcc-toolset-13/root/usr/bin/g++
            fortran: /opt/rh/gcc-toolset-13/root/usr/bin/gfortran
      - spec: gcc@15 languages:='c,c++,fortran'
        prefix: /opt/rh/gcc-toolset-15/root/usr
        extra_attributes:
          compilers:
            c: /opt/rh/gcc-toolset-15/root/usr/bin/gcc
            cxx: /opt/rh/gcc-toolset-15/root/usr/bin/g++
            fortran: /opt/rh/gcc-toolset-15/root/usr/bin/gfortran

    # OpenMPI: same install prefix on every Rocky version, version differs.
    # Spack picks whichever matches the toolchain pin (we don't %-pin here
    # because the toolchains intentionally use bare `%openmpi`).
    openmpi:
      buildable: false
      externals:
      - spec: openmpi@4.1.1
        prefix: /usr/lib64/openmpi
      - spec: openmpi@4.1.5
        prefix: /usr/lib64/openmpi

    doxygen:
      buildable: false
      externals:
      - spec: doxygen@1.8.20
        prefix: /usr

    # ---- CUDA ----
    cuda:
      buildable: False
      externals:
      - spec: cuda@12.9.1 +allow-unsupported-compilers
        prefix: /usr/local/cuda
      - spec: cuda@13.2.1 +allow-unsupported-compilers
        prefix: /usr/local/cuda

    # ---- System tools provided by the base image ----
    autoconf:
      version: [2.71]
      buildable: false
      externals:
      - spec: autoconf@2.71
        prefix: /usr
    automake:
      version: [1.16.5]
      buildable: false
      externals:
      - spec: automake@1.16.5
        prefix: /usr
    cmake:
      version: [3.31.9]
      buildable: false
      externals:
      - spec: cmake@3.31.9
        prefix: /usr/local
    m4:
      buildable: false
      externals:
      - spec: m4@1.4.18
        prefix: /usr
    netlib-lapack:
      buildable: false
      externals:
      - spec: netlib-lapack@3.8.0
        prefix: /usr
    netlib-blas:
      buildable: false
      externals:
      - spec: netlib-blas@3.8.0
        prefix: /usr
    perl:
      buildable: false
      externals:
      - spec: perl@5.26.3
        prefix: /usr
    pkg-config:
      buildable: false
      externals:
      - spec: pkg-config@1.4.2
        prefix: /usr
    python:
      buildable: false
      externals:
      - spec: python@3.6.8
        prefix: /usr
      - spec: python@3.9.18
        prefix: /usr
    tar:
      buildable: false
      externals:
      - spec: tar@1.34
        prefix: /usr
    unzip:
      buildable: false
      externals:
      - spec: unzip@6.0
        prefix: /usr
    xz:
      buildable: false
      externals:
      - spec: xz@5.2.5
        prefix: /usr
    zlib:
      buildable: false
      externals:
      - spec: zlib@1.2.11
        prefix: /usr
