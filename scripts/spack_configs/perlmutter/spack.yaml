# Uberenv command to build geos dependencies on Perlmutter:
#
# python3 ./scripts/uberenv/uberenv.py --spec="+cuda~uncrustify cuda_arch=80 %gcc@14.3.0" --spack-env-file=scripts/spack_configs/perlmutter/spack.yaml
#

spack:
  config:
    install_tree:
      root: $spack/..
      projections:
        all: '{compiler.name}-{compiler.version}/{name}-{version}-{hash}'
    misc_cache: $spack/../misc_cache
    test_stage: $spack/../test_stage
    build_stage: $spack/../build_stage
    build_jobs: 128

  # Regular TPLs do not need views
  view: false

  # Include shared variants and versions
  include:
  - ../defaults.yaml
  - ../versions.yaml
toolchains:
  gcc-14:
  - spec: '%c=gcc@14.3.0'
    when: '%c'
  - spec: '%cxx=gcc@14.3.0'
    when: '%cxx'
  - spec: '%fortran=gcc@14.3.0'
    when: '%fortran'
  - spec: '%cray-mpich@9.0.1'
    when: '%mpi'
  cce-20:
  - spec: '%c=cce@20.0.0'
    when: '%c'
  - spec: '%cxx=cce@20.0.0'
    when: '%cxx'
  - spec: '%fortran=cce@20.0.0'
    when: '%fortran'
  - spec: '%cray-mpich@9.0.1'
    when: '%mpi'

packages:
  all:
    target: [zen3]

  mpi:
    require:
    - cray-mpich
    buildable: false

  zlib-api:
    require:
    - zlib

  blas:
    require:
    - "cray-libsci"
    buildable: false
  lapack:
    require:
    - "cray-libsci"
    buildable: false
    # Compilers
    gcc:
      require: "@14.3.0"
      externals:
      - spec: gcc@14.3.0 languages=c,c++,fortran
        prefix: /opt/cray/pe/gcc-native/14
        extra_attributes:
          compilers:
            c: /opt/cray/pe/gcc-native/14/bin/gcc
            cxx: /opt/cray/pe/gcc-native/14/bin/g++
            fortran: /opt/cray/pe/gcc-native/14/bin/gfortran
          extra_rpaths:
            - /usr/lib64
            - /opt/cray/pe/mpich/9.0.1/ofi/gnu/12.3/lib
            - /opt/cray/pe/mpich/9.0.1/gtl/lib
            - /opt/cray/libfabric/1.22.0/lib64
      buildable: false

    cce:
      require: "@20.0.0"
      externals:
      - spec: cce@20.0.0 languages=c,c++,fortran
        prefix: /opt/cray/pe/cce/20.0.0
        extra_attributes:
          compilers:
            c: /opt/cray/pe/cce/20.0.0/bin/cc
            cxx: /opt/cray/pe/cce/20.0.0/bin/CC
            fortran: /opt/cray/pe/cce/20.0.0/bin/ftn
          environment:
            set:
              CC: /opt/cray/pe/cce/20.0.0/bin/cc
              CXX: /opt/cray/pe/cce/20.0.0/bin/CC
              FC: /opt/cray/pe/cce/20.0.0/bin/ftn
              F77: /opt/cray/pe/cce/20.0.0/bin/ftn
              CRAY_CPU_TARGET: zen3
          extra_rpaths:
            - /opt/cray/pe/cce/20.0.0/cce/x86_64/lib
            - /opt/cray/pe/cce/20.0.0/cce-clang/x86_64/lib
            - /opt/cray/libfabric/1.22.0/lib64
            - /opt/cray/pe/mpich/9.0.1/gtl/lib
      buildable: false

    # MPI
    cray-mpich:
      require: "@9.0.1"
      buildable: false
      externals:
      - spec: cray-mpich@9.0.1 %gcc@14.3.0
        prefix: /opt/cray/pe/mpich/9.0.1/ofi/gnu/12.3
        extra_attributes:
          extra_rpaths:
            - /opt/cray/pe/mpich/9.0.1/ofi/gnu/12.3/lib
            - /opt/cray/pe/mpich/9.0.1/gtl/lib
            - /opt/cray/libfabric/1.22.0/lib64
      - spec: cray-mpich@9.0.1 %cce@20.0.0
        prefix: /opt/cray/pe/mpich/9.0.1/ofi/crayclang/20.0
        extra_attributes:
          extra_rpaths:
            - /opt/cray/pe/mpich/9.0.1/ofi/crayclang/20.0/lib
            - /opt/cray/pe/mpich/9.0.1/gtl/lib
            - /opt/cray/libfabric/1.22.0/lib64

    # libfabric
    libfabric:
      require: "@1.22.0"
      buildable: false
      externals:
      - spec: libfabric@1.22.0
        prefix: /opt/cray/libfabric/1.22.0

    # BLAS/LAPACK
    cray-libsci:
      require: "@25.09.0"
      buildable: false
      externals:
      - spec: cray-libsci@25.09.0 %gcc@14.3.0
        prefix: /opt/cray/pe/libsci/25.09.0/GNU/12.3/x86_64
      - spec: cray-libsci@25.09.0 %cce@20.0.0
        prefix: /opt/cray/pe/libsci/25.09.0/CRAYCLANG/20.0/x86_64

    # CUDA
    cuda:
      require: "@12.9"
      buildable: false
      externals:
      - spec: cuda@12.9
        prefix: /opt/nvidia/hpc_sdk/Linux_x86_64/25.5/cuda/12.9

    # System level packages
    texinfo:
      buildable: false
      externals:
      - spec: texinfo@7.0
        prefix: /usr
    papi:
      buildable: false
      externals:
        - spec: papi@7.2.0.2
          prefix: /opt/cray/pe/papi/7.2.0.2
    cmake:
      buildable: false
      externals:
      - spec: cmake@3.30.2
        prefix: /global/common/software/nersc9/cmake/3.30.2
    python:
      buildable: false
      externals:
      - spec: python@3.11.7
        prefix: /opt/cray/pe/python/3.11.7
    zlib:
      buildable: false
      externals:
      - spec: zlib@1.2.11
        prefix: /usr
    ninja:
      buildable: false
      externals:
      - spec: ninja@1.12.1
        prefix: /usr
    m4:
      buildable: false
      externals:
      - spec: m4@1.4.18
        prefix: /usr
    perl:
      buildable: false
      externals:
      - spec: perl@5.34.0
        prefix: /usr
    pkg-config:
      buildable: false
      externals:
      - spec: pkg-config@0.29.2
        prefix: /usr
    diffutils:
      buildable: false
      externals:
      - spec: diffutils@3.7
        prefix: /usr
    autoconf:
      buildable: false
      externals:
      - spec: autoconf@2.69
        prefix: /usr
    automake:
      buildable: false
      externals:
      - spec: automake@1.16.5
        prefix: /usr
    libtool:
      buildable: false
      externals:
      - spec: libtool@2.4.6
        prefix: /usr
    gettext:
      buildable: false
      externals:
      - spec: gettext@0.21
        prefix: /usr
